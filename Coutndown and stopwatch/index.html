<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- css file linked -->
    <link rel="stylesheet" href="style.css">

    <!-- remix cdn linked -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.4.0/remixicon.css" integrity="sha512-hH7VMMVfPgfkpYx2GazOEG6RrYM+y8cS7FzccwBTWQeyhPv01XYk0MVcuhh4EAimOELWvqKjhNwes/UsYoyN6w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    
    <div class="container">
        <div class="clock-container">
            <div class="clock-header">
                <h3 class="heading">Countdown Timer</h3>
                <button class="btn btn-close"><i class="ri-close-large-fill"></i></button>
            </div>
            <div class="clock-body">
                <div class="text" id="hour">00</div>
                <div class="indecate">Hour</div>
                <div class="text" id="min">00</div>
                <div class="indecate">Min</div>
                <div class="text" id="sec">00</div>
                <div class="indecate">Sec</div>
            </div>
            <div class="clock-footer">
                <button class="btn btn-edit"><i class="ri-edit-2-fill"></i></button>
                <button class="btn btn-restart"><i class="ri-loop-right-line"></i></button>
                <button class="btn btn-pause"><i class="ri-pause-large-line"></i></button>
                <button class="btn btn-seting"><i class="ri-settings-5-fill"></i></button>
            </div>
        </div>
    </div>

    <div class="set-time-container">
        <div class="header">
            <h3 class="set-time-heading">Set time</h3>
            <button class="btn btn-close-set-time"><i class="ri-close-large-fill"></i></button>
        </div>
        <div class="set-time">
            <select name="time" id="time">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
                <option value="14">14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
                <option value="25">25</option>
                <option value="26">26</option>
                <option value="27">27</option>
                <option value="28">28</option>
                <option value="29">29</option>
                <option value="30">30</option>
                <option value="31">31</option>
                <option value="32">32</option>
                <option value="33">33</option>
                <option value="34">34</option>
                <option value="35">35</option>
                <option value="36">36</option>
                <option value="37">37</option>
                <option value="38">38</option>
                <option value="39">39</option>
                <option value="40">40</option>
                <option value="41">41</option>
                <option value="42">42</option>
                <option value="43">43</option>
                <option value="44">44</option>
                <option value="45">45</option>
                <option value="46">46</option>
                <option value="47">47</option>
                <option value="48">48</option>
                <option value="49">49</option>
                <option value="50">50</option>
                <option value="51">51</option>
                <option value="52">52</option>
                <option value="53">53</option>
                <option value="54">54</option>
                <option value="55">55</option>
                <option value="56">56</option>
                <option value="57">57</option>
                <option value="58">58</option>
                <option value="59">59</option>
                <option value="60">60</option>
            </select>
            <select name="type" id="timeType">
                <option value="second">sec</option>
                <option value="minute">min</option>
                <option value="hour">hour</option>
            </select>
        </div>

        <button class="btn btn-set-time">Set Time</button>
    </div>

    <!-- js file linked -->
     <script src="script.js"></script>
</body>
</html>
